name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package-dir: .
            run-tests: true
            run-build: true
          - package-dir: hapi-loader
            run-tests: false
            run-build: false
          - package-dir: EMR/emr-frontend-clean
            run-tests: false
            run-build: true
          - package-dir: EMR/terminology-service
            run-tests: false
            run-build: false

    defaults:
      run:
        working-directory: ${{ matrix.package-dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            hapi-loader/package-lock.json
            EMR/emr-frontend-clean/package-lock.json
            EMR/terminology-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        if: ${{ matrix.package-dir == '.' }}
        run: npx prisma generate

      - name: Run lint (if present)
        run: npm run lint --if-present

      - name: Run tests (when enabled)
        if: ${{ matrix.run-tests }}
        run: npm test --if-present

      - name: Skip service-dependent tests
        if: ${{ !matrix.run-tests }}
        run: echo "Skipping service-dependent or non-essential tests for ${{ matrix.package-dir }}"

      - name: Run build (when enabled)
        if: ${{ matrix.run-build }}
        run: npm run build --if-present
